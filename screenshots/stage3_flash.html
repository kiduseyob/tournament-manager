<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Manager — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --gold: #c9a227;
    --gold-light: #e8b84b;
    --text: #e0e0e8;
    --muted: #888899;
    --error-bg: #2a1a1a;
    --error-border: #c0392b;
    --error-text: #e74c3c;
    --success-bg: #1a2a1a;
    --success-border: #27ae60;
    --success-text: #2ecc71;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(ellipse at top, #1a1a30 0%, #0f0f13 60%);
  }

  /* Browser chrome simulation */
  .browser-chrome {
    position: fixed; top: 0; left: 0; right: 0;
    background: #2b2b2b;
    height: 72px;
    display: flex;
    flex-direction: column;
    z-index: 9999;
    box-shadow: 0 1px 0 #111;
  }
  .browser-top-bar {
    height: 36px;
    background: #3c3c3c;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .browser-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
  .btn-close { background: #ff5f57; }
  .btn-min { background: #ffbd2e; }
  .btn-max { background: #28c840; }
  .tab-area {
    height: 36px;
    background: #2b2b2b;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 0;
  }
  .browser-tab {
    background: #f0f0f0;
    color: #333;
    height: 30px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    border-radius: 6px 6px 0 0;
    font-family: 'Inter', sans-serif;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .new-tab-btn { color: #aaa; font-size: 18px; padding: 0 6px; cursor: pointer; }

  .browser-address-bar {
    display: none; /* hidden — we use the second row */
  }

  /* Address bar row */
  .browser-nav {
    position: fixed; top: 72px; left: 0; right: 0;
    height: 40px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    z-index: 9999;
    box-shadow: 0 1px 0 #ccc;
  }
  .nav-btn { color: #666; font-size: 16px; padding: 4px 6px; cursor: pointer; border: none; background: none; }
  .nav-btn:hover { background: #e0e0e0; border-radius: 50%; }
  .address-bar {
    flex: 1;
    height: 28px;
    background: #fff;
    border-radius: 14px;
    border: 1px solid #ddd;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    font-size: 13px;
    color: #333;
    font-family: 'Inter', sans-serif;
  }
  .address-bar .lock { color: #4caf50; font-size: 12px; }
  .address-bar .url { color: #444; }
  .address-bar .url-path { color: #666; }
  .address-bar-right { color: #888; font-size: 13px; }

  /* Page content */
  .page-content {
    margin-top: 112px;
    width: 100%;
    min-height: calc(100vh - 112px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  /* Flash messages */
  .flash-container {
    width: 100%;
    max-width: 440px;
    margin-bottom: 20px;
  }
  .flash {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border: 1px solid;
    line-height: 1.5;
  }
  .flash.error {
    background: var(--error-bg);
    border-color: var(--error-border);
    color: var(--error-text);
  }
  .flash-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* Login card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .logo-area {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
  }
  .logo-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
  }
  .logo-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .form-group input {
    width: 100%;
    height: 44px;
    background: #0f0f13;
    border: 1px solid var(--error-border);
    border-radius: 8px;
    color: var(--text);
    padding: 0 14px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.15);
  }
  .btn-login {
    width: 100%;
    height: 46px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none;
    border-radius: 8px;
    color: #0f0f13;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    margin-top: 8px;
    font-family: 'Inter', sans-serif;
  }
  .btn-login:hover { filter: brightness(1.08); }
</style>
</head>
<body>

<!-- Simulated browser chrome -->
<div class="browser-chrome">
  <div class="browser-top-bar">
    <div class="browser-btn btn-close"></div>
    <div class="browser-btn btn-min"></div>
    <div class="browser-btn btn-max"></div>
    <div class="tab-area" style="margin-left:8px;flex:1">
      <div class="browser-tab">🏆 Tournament Manager — Login</div>
      <div class="new-tab-btn">+</div>
    </div>
  </div>
</div>

<div class="browser-nav">
  <button class="nav-btn">←</button>
  <button class="nav-btn">→</button>
  <button class="nav-btn">↻</button>
  <div class="address-bar">
    <span class="lock">🔒</span>
    <span class="url">127.0.0.1:5000<span class="url-path">/login</span></span>
  </div>
  <span class="address-bar-right">⋮</span>
</div>

<!-- Page content -->
<div class="page-content">

  <!-- Flash error message -->
  <div class="flash-container">
    <div class="flash error">
      <span class="flash-icon">⚠</span>
      <span>Invalid credentials. Please try again.</span>
    </div>
  </div>

  <!-- Login card -->
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">🏆</div>
      <div class="logo-title">Tournament Manager</div>
      <div class="logo-sub">Administrator Portal</div>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" value="admin" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" value="wrongpass" placeholder="Enter password">
    </div>
    <button class="btn-login">Sign In</button>
  </div>

</div>

</body>
</html>
